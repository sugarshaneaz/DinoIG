openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dinosaurs
    description: Dinosaur operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /dinosaurs:
    get:
      operationId: getDinosaurs
      tags: [dinosaurs]
      summary: List all dinosaurs
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of dinosaurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dinosaur"
    post:
      operationId: createDinosaur
      tags: [dinosaurs]
      summary: Create a dinosaur
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDinosaur"
      responses:
        "201":
          description: Created dinosaur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dinosaur"
  /dinosaurs/{id}:
    get:
      operationId: getDinosaur
      tags: [dinosaurs]
      summary: Get a dinosaur by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dinosaur details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dinosaur"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDinosaur
      tags: [dinosaurs]
      summary: Partially update a dinosaur
      description: All fields are optional; only provided fields are updated.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDinosaur"
      responses:
        "200":
          description: Updated dinosaur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dinosaur"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDinosaur
      tags: [dinosaurs]
      summary: Delete a dinosaur
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dinosaurs/{id}/like:
    post:
      operationId: likeDinosaur
      tags: [dinosaurs]
      summary: Like a dinosaur post
      description: |
        Idempotent per device. The server deduplicates likes using the
        `X-Device-Id` header (preferred) or a hash of IP + user agent as a
        fallback. Repeated calls from the same device return the current count
        without incrementing it.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: X-Device-Id
          in: header
          required: false
          description: Stable per-device identifier for like deduplication.
          schema:
            type: string
            maxLength: 128
      responses:
        "200":
          description: Current dinosaur (possibly with incremented like count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dinosaur"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dinosaurs/{id}/fetch-image:
    post:
      operationId: fetchDinosaurImage
      tags: [dinosaurs]
      summary: Search for and save a dinosaur image from Wikipedia
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated dinosaur with image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dinosaur"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Dinosaur:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        period:
          type: string
        diet:
          type: string
        imageUrl:
          type: string
          nullable: true
        likesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - description
        - period
        - diet
        - likesCount
        - createdAt
        - updatedAt
    CreateDinosaur:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        period:
          type: string
        diet:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - name
        - description
        - period
        - diet
    UpdateDinosaur:
      type: object
      description: Partial update. Provide only the fields you want to change.
      properties:
        name:
          type: string
        description:
          type: string
        period:
          type: string
        diet:
          type: string
        imageUrl:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
